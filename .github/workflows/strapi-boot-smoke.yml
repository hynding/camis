name: strapi-boot-smoke
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
jobs:
  boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @camis/adapter-strapi smoke
