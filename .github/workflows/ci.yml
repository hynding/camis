name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r typecheck
      - run: pnpm -r test

  # Later phases add jobs here (kept separate so they're additive, not a rewrite):
  #   expr-php-emit   — needs PHP to run emitted PHP against the conformance vectors
  #   adapter-filament — needs PHP + sqlite/mysql/pgsql service containers
