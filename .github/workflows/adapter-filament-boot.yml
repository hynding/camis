name: adapter-filament-boot
on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 6 * * *"
jobs:
  boot:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mysql, pgsql]
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: camis
          MYSQL_ROOT_PASSWORD: camis
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: camis
          POSTGRES_PASSWORD: camis
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Scaffold Laravel 12 + Filament v5
        run: |
          composer create-project laravel/laravel:^12 app --no-interaction
          cd app
          composer require filament/filament:"^5.0" --no-interaction
          php artisan filament:install --panels --no-interaction
      - name: Install Spatie + HasRoles
        run: |
          cd app
          composer require spatie/laravel-permission --no-interaction
          php artisan vendor:publish --provider="Spatie\Permission\PermissionServiceProvider" --no-interaction
          php -r '$f="app/Models/User.php";$c=file_get_contents($f);$c=str_replace("use HasFactory, Notifiable;","use HasFactory, Notifiable, \\Spatie\\Permission\\Traits\\HasRoles;",$c);file_put_contents($f,$c);'
      - name: Overlay camis-generated files
        run: pnpm --filter @camis/adapter-filament overlay "$GITHUB_WORKSPACE/app"
      - name: Hook reference impl (uppercase title on publish)
        run: |
          cat > "$GITHUB_WORKSPACE/app/app/Hooks/TransformTitle.php" <<'PHP'
          <?php
          declare(strict_types=1);
          namespace App\Hooks;
          use App\Hooks\Contracts\TransformTitleHook;
          final class TransformTitle implements TransformTitleHook
          {
              public function run(array $input): array { return ['title' => strtoupper($input['title'])]; }
          }
          PHP
      - name: Configure DB env (${{ matrix.db }})
        run: |
          cd app
          case "${{ matrix.db }}" in
            sqlite) echo "DB_CONNECTION=sqlite" >> .env; touch database/database.sqlite ;;
            mysql)  printf 'DB_CONNECTION=mysql\nDB_HOST=127.0.0.1\nDB_PORT=3306\nDB_DATABASE=camis\nDB_USERNAME=root\nDB_PASSWORD=camis\n' >> .env ;;
            pgsql)  printf 'DB_CONNECTION=pgsql\nDB_HOST=127.0.0.1\nDB_PORT=5432\nDB_DATABASE=camis\nDB_USERNAME=postgres\nDB_PASSWORD=camis\n' >> .env ;;
          esac
      - name: Migrate + seed + enforce
        run: |
          cd app
          php artisan migrate --force
          php artisan db:seed --class="Database\\Seeders\\RolePermissionSeeder" --force
          php artisan about
          php artisan tinker --execute='
            $u = \App\Models\User::factory()->create();
            $u->assignRole("Editor");
            $published = new \App\Models\Article(["status" => "published"]);
            $draft = new \App\Models\Article(["status" => "draft"]);
            $allow = \Illuminate\Support\Facades\Gate::forUser($u)->allows("view", $published);
            $deny = \Illuminate\Support\Facades\Gate::forUser($u)->allows("view", $draft);
            if ($allow !== true || $deny !== false) { fwrite(STDERR, "ENFORCEMENT MISMATCH allow=".var_export($allow,true)." deny=".var_export($deny,true)."\n"); exit(1); }
            echo "ENFORCEMENT OK\n";
            $art = \App\Models\Article::create(["title" => "hello"]);
            $art->published_at = now(); $art->save();
            if ($art->fresh()->title !== "HELLO") { fwrite(STDERR, "HOOK MISMATCH title=".$art->fresh()->title."\n"); exit(1); }
            echo "HOOK OK\n";
          '
